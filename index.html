<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>下单价格核算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"微软雅黑",sans-serif;background:#f5f7fa;padding:10px;}
.container{width:100%;max-width:100%;background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 8px #eee;}
h2{text-align:center;color:#333;margin-bottom:15px;font-size:18px;}
.box{margin:10px 0;}
label{display:block;margin-bottom:4px;font-weight:500;color:#444;font-size:14px;}
input,textarea{width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none;background:#fafafa;}
input:focus,textarea:focus{border-color:#2d8cf0;background:#fff;}
button{width:100%;background:#2d8cf0;color:#fff;border:none;padding:10px;border-radius:6px;font-size:15px;cursor:pointer;margin-top:5px;}
button:active{background:#1b76d8;}
.result{margin-top:15px;padding:12px;border:1px solid #eee;border-radius:8px;line-height:1.7;font-size:14px;white-space:pre-wrap;word-break:break-all;overflow-wrap:break-word;background:#fefefe;}
#searchResult{max-height:300px;overflow-y:auto;}
.flex-row{display:flex;gap:8px;align-items:flex-end;}
.flex-row .box{flex:1;margin:0;}
.tip{color:#999;font-size:12px;margin-top:3px;}
.copy-btn{width:100%;background:#27ae60;margin-top:10px;}
.price-tab{display:flex;gap:8px;margin:10px 0;}
.price-tab button{flex:1;margin:0;background:#eee;color:#333;}
.price-tab button.active{background:#2d8cf0;color:#fff;}
.edit-price{color:#2d8cf0;cursor:pointer;border-bottom:1px dashed #2d8cf0;margin-left:5px;}
.edit-price:hover{color:#1b76d8;}
.edit-price.disabled{color:#999;cursor:not-allowed;border-bottom:none;}
.stock-btn{color:#e74c3c;cursor:pointer;font-size:12px;margin-left:8px;padding:2px 6px;border:1px solid #e74c3c;border-radius:3px;}
.stock-btn:hover{background:#e74c3c;color:#fff;}
.price-input{width:60px;padding:2px 5px;font-size:14px;border:1px solid #2d8cf0;border-radius:4px;text-align:center;}
.sync-status{font-size:12px;color:#999;text-align:center;margin-bottom:10px;}
.sync-status.synced{color:#27ae60;}
.sync-status.syncing{color:#f39c12;}
.admin-btn{background:#e74c3c;margin-top:5px;}
.admin-btn:hover{background:#c0392b;}
.admin-btn.logged{background:#27ae60;}
.btn-group{display:flex;gap:8px;}
.btn-group button{flex:1;margin:0;}
.init-btn{background:#9b59b6;}
.reset-btn{background:#e67e22;}
</style>
</head>
<body>
<div class="container">
    <h2>下单价格核算器</h2>
    <div class="sync-status" id="syncStatus">正在连接云端...</div>
    <div class="price-tab">
        <button id="tab1" class="active" onclick="switchPrice(1)">价格表1</button>
        <button id="tab2" onclick="switchPrice(2)">价格表2</button>
    </div>
    <div class="box">
        <label>输入商品序号（支持 6、6x2、6*2，空格/逗号分隔）</label>
        <input type="text" id="numInput" placeholder="示例：1 6x2 21*3">
        <div class="tip">支持空格、中英文逗号、混合分隔</div>
    </div>
    <div class="box">
        <label>搜索商品（输入部分名称）</label>
        <div class="flex-row">
            <input type="text" id="searchInput" placeholder="输入商品名称关键字">
            <button onclick="searchGoods()" style="width:80px;margin-top:0;background:#27ae60;">搜索</button>
        </div>
    </div>
    <div class="result" id="searchResult" style="display:none;"></div>
    <div class="flex-row">
        <div class="box">
            <label>单件统一优惠</label>
            <input type="number" id="discountInput" value="0" min="0" step="0.1">
        </div>
        <div class="box">
            <button onclick="getPrice()">一键核算</button>
        </div>
    </div>
    <div class="box">
        <label>对应商品清单</label>
        <textarea id="goodsNameText" readonly rows="6" placeholder="商品+购买份数自动展示"></textarea>
    </div>
    <div class="result" id="showResult"></div>
    <div class="btn-group">
        <button class="copy-btn" onclick="copyOrder()" id="copyBtn">一键复制整单信息</button>
    </div>
    <div id="adminSection" style="display:none;margin-top:10px;">
        <button id="adminBtn" class="admin-btn" onclick="checkAdminPassword()">管理员登录</button>
        <button id="initBtn" class="init-btn" onclick="initDefaultPrices()" style="display:none;">初始化默认价格表</button>
        <button id="resetBtn" class="reset-btn" onclick="resetToDefault()" style="display:none;">恢复原始价格</button>
    </div>
</div>

// 绑定三击事件到价格表1按钮（脚本在body内，DOM已准备好）
function bindTapEvent(){
    let tab1Btn = document.getElementById("tab1");
    if(tab1Btn){
        tab1Btn.addEventListener("click", function(e){
            tapCount++;
            if(tapCount >= 3){
                e.stopPropagation();
                e.preventDefault();
                revealAdmin();
                tapCount = 0;
                if(tapTimer) clearTimeout(tapTimer);
                return false;
            }
            if(tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(function(){
                tapCount = 0;
            }, 600);
        }, true); // 使用捕获阶段，先于onclick执行
    }
}
bindTapEvent();

// 电脑端 Ctrl+Shift+A 显示管理员入口
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && e.shiftKey && (e.key === "A" || e.key === "a")){
        e.preventDefault();
        revealAdmin();
    }
});

function revealAdmin(){
    let section = document.getElementById("adminSection");
    if(!adminRevealed){
        section.style.display = "block";
        adminRevealed = true;
    } else {
        section.style.display = "none";
        adminRevealed = false;
    }
}

async function checkAdminPassword(){
    let password = prompt("请输入管理员密码：");
    if(!password) return;
    
    try {
        let response = await fetch(API_BASE + "/api/check-admin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: password })
        });
        let result = await response.json();
        
        if(result.success){
            isAdmin = true;
            let adminBtn = document.getElementById("adminBtn");
            adminBtn.innerText = "已登录管理员";
            adminBtn.classList.add("logged");
            adminBtn.onclick = function(){
                if(confirm("确定要退出管理员登录吗？")){
                    isAdmin = false;
                    adminBtn.innerText = "管理员登录";
                    adminBtn.classList.remove("logged");
                    adminBtn.onclick = checkAdminPassword;
                    document.getElementById("initBtn").style.display = "none";
                    document.getElementById("resetBtn").style.display = "none";
                }
            };
            // 显示初始化和恢复按钮
            document.getElementById("initBtn").style.display = "block";
            document.getElementById("resetBtn").style.display = "block";
            alert("登录成功！");
        } else {
            alert("密码错误！");
        }
    } catch(e) {
        alert("验证失败，请检查网络");
    }
}

// ====================== 价格加载和保存 ======================

async function loadPricesFromWorker(){
    let syncStatus = document.getElementById("syncStatus");
    syncStatus.innerText = "正在加载云端价格...";
    syncStatus.className = "sync-status syncing";
    
    try {
        let tableName = currentPriceTab === 1 ? "prices1" : "prices2";
        let response = await fetch(API_BASE + "/api/get-prices?table=" + tableName);
        let data = await response.json();
        
        // 清空当前数据
        currentPriceData = {};
        
        // 填充云端数据
        if(data && data.length > 0){
            data.forEach(item => {
                currentPriceData[item.id] = {
                    name: item.name,
                    price: item.price || 0,
                    stock: item.stock === 0 || item.stock === false ? false : true
                };
            });
        }
        
        syncStatus.innerText = "已同步到云端 ✓";
        syncStatus.className = "sync-status synced";
    } catch(e) {
        syncStatus.innerText = "加载失败，请检查网络";
        syncStatus.className = "sync-status";
        console.error("加载失败:", e);
    }
}

async function savePriceToWorker(key, price){
    let syncStatus = document.getElementById("syncStatus");
    syncStatus.innerText = "正在保存...";
    syncStatus.className = "sync-status syncing";
    
    try {
        let item = currentPriceData[key];
        let endpoint = currentPriceTab === 1 ? "/api/save-price" : "/api/save-price2";
        await fetch(API_BASE + endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                id: key,
                name: item.name,
                price: price,
                stock: item.stock === false ? 0 : 1
            })
        });
        syncStatus.innerText = "已同步到云端 ✓";
        syncStatus.className = "sync-status synced";
    } catch(e) {
        syncStatus.innerText = "同步失败";
        console.error("保存失败:", e);
    }
}

// ====================== 价格核算 ======================

function getPrice(){
    let inputVal = document.getElementById("numInput").value.trim();
    let discount = parseFloat(document.getElementById("discountInput").value) || 0;
    let resDom = document.getElementById("showResult");
    let nameText = document.getElementById("goodsNameText");

    if(!inputVal){
        resDom.innerText = "请输入商品序号！";
        nameText.value = "";
        return;
    }

    if(inputVal === "0000"){
        showAllGoods();
        return;
    }

    inputVal = inputVal.replace(/，/g, ",").replace(/\s+/g, ",").replace(/,+/g, ",");
    let items = inputVal.split(",");

    let priceExprArr = [];
    let nameShowArr = [];
    let numShowArr = [];
    let totalCount = 0;
    let allTotal = 0;
    let errTip = "";

    items.forEach(item=>{
        item = item.trim();
        if(!item) return;
        let times = 1;
        let n;
        if(item.includes("x") || item.includes("*")){
            let parts = item.split(/[x*]/);
            n = parts[0].trim();
            times = parseInt(parts[1])||1;
        }else{
            n = item;
        }
        let key = n.padStart(2,'0');
        if(currentPriceData[key]){
            let ori = currentPriceData[key].price;
            let singleSale = Math.max(ori - discount, 0);
            let stockStatus = currentPriceData[key].stock === false ? "【无】" : "";
            allTotal += singleSale * times;
            priceExprArr.push(times===1 ? singleSale+"" : singleSale+"×"+times);
            nameShowArr.push(`${currentPriceData[key].name}${stockStatus} x${times}`);
            numShowArr.push(times>1 ? `${n}x${times}` : n);
            totalCount += times;
        }else{
            errTip += `序号${n}：无此商品\n`;
        }
    });

    let saleStr = priceExprArr.join("+")+"="+allTotal;
    let shippingFee = currentPriceTab === 1 ? 12 : 15;
    let totalWithShipping = allTotal + shippingFee;
    
    nameText.value = nameShowArr.join("\n");

    finalOrderText = `${numShowArr.join("，")}\n共${totalCount}包\n${saleStr}+邮费${shippingFee}=${totalWithShipping}`;
    resDom.innerText = errTip + finalOrderText;
}

        if(item.name && item.name.trim()){
            let salePrice = item.price - discount;
            let stockStatus = item.stock === false ? " 【无】" : "";
            allGoods.push(`${key} ${item.name}${stockStatus} - ￥${salePrice}`);
            nameList.push(`${key} ${item.name}${stockStatus}`);
        }
    });
    
    nameText.value = nameList.join("\n");
    let discountTip = "";
    if(discount > 0){
        discountTip = `（单件优惠￥${discount}）`;
    }else if(discount < 0){
        discountTip = `（单件加价￥${Math.abs(discount)}）`;
    }
    finalOrderText = title + discountTip + "\n\n" + allGoods.join("\n");
    resDom.innerText = finalOrderText;
}

// ====================== 搜索功能 ======================

function searchGoods(){
    let keyword = document.getElementById("searchInput").value.trim();
    let resultDom = document.getElementById("searchResult");
    
    if(!keyword){
        resultDom.style.display = "none";
        return;
    }
    
    let results = [];
    let keys = Object.keys(currentPriceData);
    
    keys.forEach(key => {
        let item = currentPriceData[key];
        if(item.name && item.name.includes(keyword)){
            let stockStatus = item.stock === false ? "【无】" : "【有】";
            let stockBtn = "";
            if(isAdmin){
                stockBtn = `<span class="stock-btn" onclick="toggleStock('${key}')">${item.stock === false ? "有" : "无"}</span>`;
            }
            let editSpan = isAdmin ? 
                `<span class="edit-price" onclick="editPrice('${key}')">￥${item.price}</span>` :
                `<span class="edit-price disabled">￥${item.price}</span>`;
            results.push(`【${key}】${item.name} <span style="color:#e74c3c;">${stockStatus}</span> ${stockBtn} - ${editSpan}`);
        }
    });
    
    if(results.length === 0){
        resultDom.innerHTML = "未找到匹配的商品";
    } else {
        let tip = isAdmin ? "（点击可修改）" : "";
        resultDom.innerHTML = `搜索结果${tip}（关键字：${keyword}）：\n` + results.join("\n");
    }
    resultDom.style.display = "block";
}

function editPrice(key){
    if(!isAdmin) return;
    let item = currentPriceData[key];
    let newPrice = prompt(`修改【${item.name}】的价格：`, item.price);
    if(newPrice !== null && newPrice !== "" && !isNaN(newPrice)){
        newPrice = parseInt(newPrice);
        currentPriceData[key].price = newPrice;
        savePriceToWorker(key, newPrice);
        searchGoods();
    }
}

function toggleStock(key){
    if(!isAdmin) return;
    let item = currentPriceData[key];
    let newStock = !item.stock;
    currentPriceData[key].stock = newStock;
    saveStockToWorker(key, newStock);
    searchGoods();
}

// ====================== 复制功能 ======================

function copyOrder(){
    if(!finalOrderText){
        alert("请先核算");
        return;
    }
    navigator.clipboard.writeText(finalOrderText).then(()=>{
        alert("已复制到剪贴板！");
    }).catch(()=>{
        alert("复制失败，请手动复制");
    });
}

// 页面加载时从Worker API同步价格
window.onload = function(){
    loadPricesFromWorker();
};
</script>
